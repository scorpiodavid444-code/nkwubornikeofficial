<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css">


<style>
 body{
  font-family: 'Poppins', system-ui, -apple-system, sans-serif;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  position:relative;
}

/* watermark background */
body::before{
  content:"";
  position:absolute;
  top:50%;
  left:5%;
  transform:translateY(-50%);
  width:350px;
  height:350px;
  background-image:url("images/logoc.png");
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center;
  opacity:0.15;
  z-index:0;
  pointer-events:none;
}


body::after{
  content:"";
  position:absolute;
  top:50%;
  right:5%;
  transform:translateY(-50%);
  width:350px;
  height:350px;
  background-image:url("images/logoc.png");
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center;
  opacity:0.15;
  z-index:0;
  pointer-events:none;
}

.contact-container{
position: relative; 
z-index: 1;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
width:400px;
text-align:center;
}

h1{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}


input:focus,
textarea:focus {
  outline: none;
}


button{
width:100%;
padding:12px;
background: #c0392b;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}


button:hover{
background: #8a2c21;
}


.contact-alt{
margin-top:18px;
font-size:16px;
color:#555;
}


@media (max-width: 768px){
  body::after{
    display:none;
  }

  body::before{
    top:40px;
    left:50%;
    transform:translateX(-50%);
    width:160px;
    height:160px;
    opacity:0.12;
  }

  body{
    flex-direction:column;
    justify-content:flex-start;
    padding-top:180px;
  }

  .contact-container{
    width:90%;
  }

}

</style>

</head>

<body>

<div class="contact-container">
<h1>Contact Us</h1>
<p>Feel Free to reach out to us.</p>

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<input type="text" id="subject" placeholder="Subject" required>

<textarea id="message" rows="6" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>
<p class="contact-alt">
Or call <a href="tel:07066406643">07066406643</a>
</p>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let subject = document.getElementById("subject").value;
let message = document.getElementById("message").value;

let body = `Name: ${name}%0D%0AEmail: ${email}%0D%0A%0D%0AMessage:%0D%0A${message}`;

window.location.href =
`mailto:nkwubornikecommunityofficial@gmail.com?subject=${subject}&body=${body}`;

});

</script>
</body>
</html>
